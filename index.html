<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font-sans,system-ui,sans-serif)}
body{background:var(--color-background-tertiary,#f5f5f3);display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:24px 12px}
.phone{width:375px;min-height:720px;background:var(--color-background-primary,#fff);border-radius:40px;border:1.5px solid var(--color-border-secondary,rgba(0,0,0,0.15));overflow:hidden;position:relative;display:flex;flex-direction:column}
.status-bar{background:var(--color-background-primary,#fff);padding:12px 24px 6px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:500;color:var(--color-text-secondary)}
.screen{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.nav-bar{background:var(--color-background-primary,#fff);border-top:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.1));display:flex;justify-content:space-around;padding:10px 0 16px}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 12px;border-radius:8px;transition:background 0.15s}
.nav-item:hover{background:var(--color-background-secondary)}
.nav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.nav-label{font-size:10px;color:var(--color-text-secondary)}
.nav-item.active .nav-label{color:#185FA5;font-weight:500}
.nav-item.active .nav-dot{background:#185FA5}
.nav-dot{width:22px;height:3px;border-radius:2px;background:transparent}
.header{padding:20px 20px 12px;border-bottom:0.5px solid var(--color-border-tertiary)}
.header h1{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.header p{font-size:13px;color:var(--color-text-secondary);margin-top:2px}
.content{padding:16px;flex:1;display:flex;flex-direction:column;gap:12px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:14px;padding:14px 16px}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.metric{background:var(--color-background-secondary);border-radius:10px;padding:12px}
.metric-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.metric-value.warn{color:#BA7517}
.metric-value.danger{color:#A32D2D}
.metric-value.good{color:#3B6D11}
.section-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.list-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer}
.list-item:last-child{border-bottom:none}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.av-blue{background:#E6F1FB;color:#0C447C}
.av-teal{background:#E1F5EE;color:#085041}
.av-amber{background:#FAEEDA;color:#633806}
.av-red{background:#FCEBEB;color:#791F1F}
.av-purple{background:#EEEDFE;color:#3C3489}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.item-sub{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.item-right{text-align:right;flex-shrink:0}
.item-val{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.item-badge{font-size:11px;padding:2px 8px;border-radius:6px;margin-top:3px;display:inline-block}
.badge-green{background:#EAF3DE;color:#27500A}
.badge-red{background:#FCEBEB;color:#791F1F}
.badge-amber{background:#FAEEDA;color:#633806}
.badge-blue{background:#E6F1FB;color:#0C447C}
.badge-gray{background:#F1EFE8;color:#444441}
.stars{color:#EF9F27;font-size:12px;letter-spacing:1px}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;background:#F1EFE8;color:#444441;margin:2px 2px 0 0}
.tag.blue{background:#E6F1FB;color:#185FA5}
.tag.teal{background:#E1F5EE;color:#0F6E56}
.tag.red{background:#FCEBEB;color:#A32D2D}
.btn{display:block;width:100%;padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:500;cursor:pointer;text-align:center;transition:opacity 0.15s}
.btn:hover{opacity:0.85}
.btn-primary{background:#185FA5;color:#fff}
.btn-outline{background:transparent;border:0.5px solid var(--color-border-secondary);color:var(--color-text-primary)}
.input-group{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.input-group label{font-size:13px;color:var(--color-text-secondary)}
.input-group input,.input-group select,.input-group textarea{padding:10px 12px;border-radius:10px;border:0.5px solid var(--color-border-secondary);font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary);width:100%}
.input-group textarea{resize:none;height:70px}
.flag-banner{background:#FAEEDA;border:0.5px solid #FAC775;border-radius:10px;padding:10px 14px;display:flex;gap:10px;align-items:flex-start}
.flag-icon{font-size:16px;flex-shrink:0}
.flag-text{font-size:12px;color:#633806;line-height:1.5}
.retainer-badge{background:#FCEBEB;border:0.5px solid #F7C1C1;border-radius:10px;padding:10px 14px;display:flex;gap:10px;align-items:center}
.retainer-text{font-size:12px;color:#791F1F;font-weight:500}
.deal-stage{display:flex;align-items:center;gap:6px;margin-top:8px}
.stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stage-active{background:#185FA5}
.stage-contract{background:#3B6D11}
.stage-closed{background:#3B6D11}
.stage-fallen{background:#A32D2D}
.stage-pending{background:#BA7517}
.stage-label{font-size:12px;color:var(--color-text-secondary)}
.login-wrap{padding:32px 24px;display:flex;flex-direction:column;gap:16px;flex:1;justify-content:center}
.login-logo{font-size:28px;font-weight:500;color:#185FA5;margin-bottom:8px;text-align:center}
.login-sub{font-size:14px;color:var(--color-text-secondary);text-align:center;margin-bottom:8px}
.divider{text-align:center;font-size:12px;color:var(--color-text-tertiary);margin:4px 0}
.progress-bar{height:4px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:2px;background:#185FA5;transition:width 0.3s}
.free-tier{background:#E6F1FB;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.free-tier-label{font-size:12px;color:#0C447C}
.upgrade-btn{font-size:12px;background:#185FA5;color:#fff;padding:4px 12px;border-radius:6px;border:none;cursor:pointer;font-weight:500}
.back-btn{font-size:13px;color:#185FA5;cursor:pointer;padding:4px 0;display:inline-block}
.detail-hero{background:var(--color-background-secondary);padding:20px;display:flex;align-items:center;gap:14px;border-bottom:0.5px solid var(--color-border-tertiary)}
.detail-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500}
.deal-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px}
.deal-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="phone" id="app">
  <div class="status-bar"><span>9:41</span><span>&#9679;&#9679;&#9679;</span></div>
  <div class="screen" id="screen"></div>
  <div class="nav-bar" id="nav" style="display:none">
    <div class="nav-item" onclick="navigate('dashboard')" id="nav-dashboard">

        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="2" fill="currentColor" opacity="0.7"/><rect x="11" y="2" width="7" height="7" rx="2" fill="currentColor" opacity="0.7"/><rect x="2" y="11" width="7" height="7" rx="2" fill="currentColor" opacity="0.7"/><rect x="11" y="11" width="7" height="7" rx="2" fill="currentColor" opacity="0.7"/></svg>

      </div>
      <span class="nav-label">Add</span>
    </div>
  </div>
</div>

<script>
const screens = {};
let currentScreen = 'login';

function navigate(name, data) {
  currentScreen = name;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + name);
  if (navEl) navEl.classList.add('active');
  document.getElementById('nav').style.display = ['login','agent-detail','client-detail','add-agent','add-client'].includes(name) ? 'none' : 'flex';
  document.getElementById('screen').innerHTML = screens[name](data);
}

    <div class="input-group"><label>Email</label><input type="email" placeholder="you@email.com" value="demo@realtrack.app"/></div>
    <div class="input-group"><label>Password</label><input type="password" placeholder="••••••••" value="demo1234"/></div>
    <button class="btn btn-primary" onclick="navigate('dashboard')">Sign in</button>
    <div class="divider">— or —</div>

    <div style="text-align:center;font-size:12px;color:var(--color-text-tertiary);margin-top:8px">Free tier: 5 agents + 5 clients</div>

        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(d.visits/10*100,100)}%;background:${d.visits>6?'#A32D2D':d.visits>3?'#BA7517':'#185FA5'}"></div></div>
      </div>
      <div>
        <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">Offers submitted</div>
        ${d.offerAmts.map((o,i)=>`<div class="deal-row"><span style="color:var(--color-text-secondary)">Offer ${i+1}</span><span style="font-weight:500">${o}</span></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="section-label">Notes</div>
      <div style="font-size:13px;color:var(--color-text-primary);line-height:1.6">${d.notes}</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" style="flex:1" onclick="alert('Log visit — connect to Supabase')">Log visit</button>
      <button class="btn btn-outline" style="flex:1" onclick="alert('Log offer — connect to Supabase')">Log offer</button>
    </div>
    ${!d.retainer ? `<button class="btn btn-outline" style="border-color:#A32D2D;color:#A32D2D" onclick="alert('Retainer flag saved — connect to Supabase')">Mark retainer required</button>` : ''}
  </div>
`;
