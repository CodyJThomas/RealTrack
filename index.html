<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RealTrack</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f5f5f3;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:24px 12px}
.phone{width:375px;min-height:720px;background:#fff;border-radius:40px;border:1.5px solid rgba(0,0,0,0.15);overflow:hidden;display:flex;flex-direction:column}
.status-bar{background:#fff;padding:12px 24px 6px;display:flex;justify-content:space-between;font-size:12px;font-weight:500;color:#888}
.screen{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.nav-bar{background:#fff;border-top:0.5px solid rgba(0,0,0,0.1);display:flex;justify-content:space-around;padding:10px 0 16px}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 12px;border-radius:8px}
.nav-label{font-size:10px;color:#888}
.nav-item.active .nav-label{color:#185FA5;font-weight:500}
.nav-dot{width:22px;height:3px;border-radius:2px;background:transparent}
.nav-item.active .nav-dot{background:#185FA5}
.header{padding:20px 20px 12px;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.header h1{font-size:22px;font-weight:500;color:#111}
.header p{font-size:13px;color:#888;margin-top:2px}
.content{padding:16px;flex:1;display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:14px;padding:14px 16px}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.metric{background:#f5f5f3;border-radius:10px;padding:12px}
.metric-label{font-size:12px;color:#888;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500;color:#111}
.metric-value.warn{color:#BA7517}
.metric-value.danger{color:#A32D2D}
.metric-value.good{color:#3B6D11}
.section-label{font-size:12px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.list-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,0.07);cursor:pointer}
.list-item:last-child{border-bottom:none}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.av-blue{background:#E6F1FB;color:#0C447C}
.av-teal{background:#E1F5EE;color:#085041}
.av-amber{background:#FAEEDA;color:#633806}
.av-red{background:#FCEBEB;color:#791F1F}
.av-purple{background:#EEEDFE;color:#3C3489}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;color:#111}
.item-sub{font-size:12px;color:#888;margin-top:2px}
.item-right{text-align:right;flex-shrink:0}
.item-badge{font-size:11px;padding:2px 8px;border-radius:6px;margin-top:3px;display:inline-block}
.badge-green{background:#EAF3DE;color:#27500A}
.badge-red{background:#FCEBEB;color:#791F1F}
.badge-amber{background:#FAEEDA;color:#633806}
.badge-blue{background:#E6F1FB;color:#0C447C}
.badge-gray{background:#F1EFE8;color:#444441}
.stars{color:#EF9F27;font-size:12px;letter-spacing:1px}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;background:#F1EFE8;color:#444441;margin:2px 2px 0 0}
.btn{display:block;width:100%;padding:13px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.15);font-size:15px;font-weight:500;cursor:pointer;text-align:center;background:transparent;color:#111}
.btn-primary{background:#185FA5;color:#fff;border:none}
.btn-danger{background:transparent;border:0.5px solid #A32D2D;color:#A32D2D}
.input-group{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.input-group label{font-size:13px;color:#888}
.input-group input,.input-group select,.input-group textarea{padding:10px 12px;border-radius:10px;border:0.5px solid rgba(0,0,0,0.15);font-size:14px;background:#fff;color:#111;width:100%}
.input-group textarea{resize:none;height:70px}
.flag-banner{background:#FAEEDA;border:0.5px solid #FAC775;border-radius:10px;padding:10px 14px;font-size:12px;color:#633806;line-height:1.5}
.retainer-badge{background:#FCEBEB;border:0.5px solid #F7C1C1;border-radius:10px;padding:10px 14px;font-size:12px;color:#791F1F;font-weight:500}
.free-tier{background:#E6F1FB;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.free-tier-label{font-size:12px;color:#0C447C}
.upgrade-btn{font-size:12px;background:#185FA5;color:#fff;padding:4px 12px;border-radius:6px;border:none;cursor:pointer;font-weight:500}
.back-btn{font-size:13px;color:#185FA5;cursor:pointer;padding:4px 0;display:inline-block}
.detail-hero{background:#f5f5f3;padding:20px;display:flex;align-items:center;gap:14px;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.deal-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid rgba(0,0,0,0.07);font-size:13px}
.deal-row:last-child{border-bottom:none}
.progress-bar{height:4px;background:#f0f0ee;border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:2px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.loading{padding:40px;text-align:center;color:#888;font-size:14px}
.error-msg{background:#FCEBEB;color:#791F1F;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:8px}
.login-wrap{padding:32px 24px;display:flex;flex-direction:column;gap:16px;flex:1;justify-content:center}
.login-logo{font-size:28px;font-weight:500;color:#185FA5;margin-bottom:8px;text-align:center}
.login-sub{font-size:14px;color:#888;text-align:center;margin-bottom:8px}
.stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:4px}
.stage-active{background:#185FA5}
.stage-contract{background:#3B6D11}
.stage-closed{background:#3B6D11}
.stage-fallen{background:#A32D2D}
.stage-pending{background:#BA7517}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="phone" id="app">
  <div class="status-bar"><span id="clock">9:41</span><span>&#9679;&#9679;&#9679;</span></div>
  <div class="screen" id="screen"><div class="loading">Loading...</div></div>
  <div class="nav-bar" id="nav" style="display:none">
    <div class="nav-item" onclick="navigate('dashboard')" id="nav-dashboard">
      <div class="nav-dot"></div>
      <svg width="22" height="22" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="2" fill="currentColor" opacity="0.7"/><rect x="11" y="2" width="7" height="7" rx="2" fill="currentColor" opacity="0.7"/><rect x="2" y="11" width="7" height="7" rx="2" fill="currentColor" opacity="0.7"/><rect x="11" y="11" width="7" height="7" rx="2" fill="currentColor" opacity="0.7"/></svg>
      <span class="nav-label">Dashboard</span>
    </div>
    <div class="nav-item" onclick="navigate('agents')" id="nav-agents">
      <div class="nav-dot"></div>
      <svg width="22" height="22" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 17c0-3.866 3.134-7 7-7s7 3.134 7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="nav-label">Agents</span>
    </div>
    <div class="nav-item" onclick="navigate('clients')" id="nav-clients">
      <div class="nav-dot"></div>
      <svg width="22" height="22" viewBox="0 0 20 20" fill="none"><circle cx="7" cy="7" r="3" stroke="currentColor" stroke-width="1.5"/><circle cx="14" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M1 17c0-3 2.686-5.5 6-5.5s6 2.5 6 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M14.5 12.5c1.933 0 3.5 1.343 3.5 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="nav-label">Clients</span>
    </div>
    <div class="nav-item" onclick="navigate('add')" id="nav-add">
      <div class="nav-dot"></div>
      <svg width="22" height="22" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/><path d="M10 7v6M7 10h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="nav-label">Add</span>
    </div>
  </div>
</div>

<script>
// ── Supabase init ──────────────────────────────────────────────
const SUPA_URL  = 'https://bylkcfoqoehkgiiqscvl.supabase.co';
const SUPA_ANON = 'sb_publishable_NkpWB9_qksTM-Kdqe7rJkg_OphNN-IL';
const sb = supabase.createClient(SUPA_URL, SUPA_ANON);

// ── State ──────────────────────────────────────────────────────
let currentUser = null;
let currentProfile = null;

// ── Clock ──────────────────────────────────────────────────────
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.getHours().toString().padStart(2, '0') + ':' +
    n.getMinutes().toString().padStart(2, '0');
}
updateClock();
setInterval(updateClock, 10000);

// ── Toast ──────────────────────────────────────────────────────
function toast(msg, dur) {
  dur = dur || 2500;
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, dur);
}

// ── Helpers ────────────────────────────────────────────────────
function initials(name) {
  return (name || '?').split(' ').map(function(n) { return n[0]; }).join('').toUpperCase().slice(0, 2);
}

var avColors = ['av-blue', 'av-teal', 'av-amber', 'av-purple', 'av-red'];
function avColor(str) {
  return avColors[(str || '').charCodeAt(0) % avColors.length];
}

function categoryBadge(cat) {
  var map = { Preferred: 'green', Reliable: 'blue', Neutral: 'gray', Difficult: 'amber', Avoid: 'red' };
  return '<span class="item-badge badge-' + (map[cat] || 'gray') + '">' + cat + '</span>';
}

function stageColor(stage) {
  var map = { 'Active': 'stage-active', 'Under Contract': 'stage-contract', 'Closed': 'stage-closed', 'Fallen Through': 'stage-fallen', 'Pending': 'stage-pending' };
  return map[stage] || 'stage-active';
}

function starStr(r) {
  return '★'.repeat(r) + '☆'.repeat(5 - r);
}

function fmt(n) {
  return n ? '$' + Number(n).toLocaleString() : '—';
}

function fmtPhone(el) {
  var v = el.value.replace(/\D/g, '').slice(0, 10);
  if (v.length >= 7) {
    v = '(' + v.slice(0, 3) + ') ' + v.slice(3, 6) + '-' + v.slice(6);
  } else if (v.length >= 4) {
    v = '(' + v.slice(0, 3) + ') ' + v.slice(3);
  } else if (v.length > 0) {
    v = '(' + v;
  }
  el.value = v;
}

function fmtDollar(el) {
  var raw = el.value.replace(/[^0-9]/g, '');
  el.value = raw ? '$' + Number(raw).toLocaleString('en-US') : '';
}

function parseDollar(val) {
  if (!val) return null;
  var raw = val.replace(/[^0-9]/g, '');
  return raw || null;
}

// ── Navigation ─────────────────────────────────────────────────
var noNavScreens = ['login', 'signup', 'agent-detail', 'client-detail', 'add-agent', 'add-client', 'add-visit', 'add-offer', 'upgrade'];

async function navigate(name, data) {
  document.getElementById('nav').style.display = noNavScreens.indexOf(name) > -1 ? 'none' : 'flex';
  document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
  var navEl = document.getElementById('nav-' + name);
  if (navEl) navEl.classList.add('active');
  document.getElementById('screen').innerHTML = '<div class="loading">Loading...</div>';
  await renderScreen(name, data);
}

async function renderScreen(name, data) {
  var scr = document.getElementById('screen');
  if (name === 'login')         { scr.innerHTML = screenLogin(); }
  else if (name === 'signup')   { scr.innerHTML = screenSignup(); }
  else if (name === 'dashboard'){ scr.innerHTML = await screenDashboard(); }
  else if (name === 'agents')   { scr.innerHTML = await screenAgents(); }
  else if (name === 'agent-detail') { scr.innerHTML = await screenAgentDetail(data); }
  else if (name === 'clients')  { scr.innerHTML = await screenClients(); }
  else if (name === 'client-detail') { scr.innerHTML = await screenClientDetail(data); }
  else if (name === 'add')      { scr.innerHTML = screenAdd(); }
  else if (name === 'add-agent'){ scr.innerHTML = screenAddAgent(); }
  else if (name === 'add-client'){ scr.innerHTML = screenAddClient(); }
  else if (name === 'add-visit'){ scr.innerHTML = screenAddVisit(data); }
  else if (name === 'upgrade')  { scr.innerHTML = screenUpgrade(); }
}

// ── Login ──────────────────────────────────────────────────────
function screenLogin() {
  return '<div class="login-wrap">'
    + '<div><div class="login-logo">RealTrack</div><div class="login-sub">Smart CRM for realtors</div></div>'
    + '<div id="login-error"></div>'
    + '<div class="input-group"><label>Email</label><input id="l-email" type="email" placeholder="you@email.com"/></div>'
    + '<div class="input-group"><label>Password</label><input id="l-pass" type="password" placeholder="••••••••"/></div>'
    + '<button class="btn btn-primary" onclick="doLogin()">Sign in</button>'
    + '<div style="text-align:center;font-size:12px;color:#aaa;margin:4px 0">— New to RealTrack? —</div>'
    + '<button class="btn" style="border-color:#185FA5;color:#185FA5" onclick="navigate(\'signup\')">Create a new account</button>'
    + '<div style="text-align:center;font-size:12px;color:#aaa;margin-top:8px">Free tier: 5 agents + 5 clients</div>'
    + '</div>';
}

function screenSignup() {
  return '<div class="login-wrap">'
    + '<div><div class="login-logo">RealTrack</div><div class="login-sub">Create your account</div></div>'
    + '<div id="signup-error"></div>'
    + '<div class="input-group"><label>Email</label><input id="s-email" type="email" placeholder="you@email.com"/></div>'
    + '<div class="input-group"><label>Choose a password</label><input id="s-pass" type="password" placeholder="At least 6 characters"/></div>'
    + '<div class="input-group"><label>Confirm password</label><input id="s-pass2" type="password" placeholder="Re-enter password"/></div>'
    + '<button class="btn btn-primary" onclick="doSignup()">Create account</button>'
    + '<div style="text-align:center;font-size:12px;color:#aaa;margin:4px 0">— Already have an account? —</div>'
    + '<button class="btn" onclick="navigate(\'login\')">Back to sign in</button>'
    + '</div>';
}

async function doLogin() {
  var email = document.getElementById('l-email').value.trim();
  var pass  = document.getElementById('l-pass').value;
  var result = await sb.auth.signInWithPassword({ email: email, password: pass });
  if (result.error) {
    document.getElementById('login-error').innerHTML = '<div class="error-msg">' + result.error.message + '</div>';
    return;
  }
  await afterAuth(result.data.user);
}

async function doSignup() {
  var email = document.getElementById('s-email').value.trim();
  var pass  = document.getElementById('s-pass').value;
  var pass2 = document.getElementById('s-pass2').value;
  if (pass !== pass2) { document.getElementById('signup-error').innerHTML = '<div class="error-msg">Passwords do not match</div>'; return; }
  if (pass.length < 6) { document.getElementById('signup-error').innerHTML = '<div class="error-msg">Password must be at least 6 characters</div>'; return; }
  var result = await sb.auth.signUp({ email: email, password: pass });
  if (result.error) {
    document.getElementById('signup-error').innerHTML = '<div class="error-msg">' + result.error.message + '</div>';
    return;
  }
  if (result.data.user) {
    await sb.from('profiles').upsert({ id: result.data.user.id, email: email, tier: 'free' });
    toast('Account created!');
    await afterAuth(result.data.user);
  }
}

async function afterAuth(user) {
  currentUser = user;
  var result = await sb.from('profiles').select('*').eq('id', user.id).single();
  currentProfile = result.data;
  navigate('dashboard');
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null;
  currentProfile = null;
  document.getElementById('nav').style.display = 'none';
  navigate('login');
}

// ── Dashboard ──────────────────────────────────────────────────
async function screenDashboard() {
  var uid = currentUser.id;
  var results = await Promise.all([
    sb.from('agents').select('id').eq('user_id', uid),
    sb.from('clients').select('id,flag_reason,retainer_required,full_name').eq('user_id', uid),
    sb.from('deals').select('id,stage').eq('user_id', uid),
    sb.from('visits').select('id,created_at').eq('user_id', uid)
  ]);
  var agents  = results[0].data || [];
  var clients = results[1].data || [];
  var deals   = results[2].data || [];
  var visits  = results[3].data || [];

  var now = new Date();
  var thisMonth = visits.filter(function(v) { return new Date(v.created_at).getMonth() === now.getMonth(); }).length;
  var activeDeals = deals.filter(function(d) { return d.stage === 'Active' || d.stage === 'Under Contract'; }).length;
  var closedDeals = deals.filter(function(d) { return d.stage === 'Closed'; }).length;
  var flagged = clients.filter(function(c) { return c.flag_reason; });
  var tier = (currentProfile && currentProfile.tier) || 'free';

  var html = '<div class="header"><h1>Dashboard</h1><p>' + currentUser.email + '</p></div>';
  html += '<div class="content">';
  if (tier === 'free') {
    html += '<div class="free-tier"><span class="free-tier-label">Free — ' + agents.length + '/5 agents, ' + clients.length + '/5 clients</span>'
         + '<button class="upgrade-btn" onclick="navigate(\'upgrade\')">Upgrade</button></div>';
  }
  html += '<div class="metric-grid">'
       + '<div class="metric"><div class="metric-label">Active deals</div><div class="metric-value">' + activeDeals + '</div></div>'
       + '<div class="metric"><div class="metric-label">Visits this month</div><div class="metric-value warn">' + thisMonth + '</div></div>'
       + '<div class="metric"><div class="metric-label">Flagged clients</div><div class="metric-value danger">' + flagged.length + '</div></div>'
       + '<div class="metric"><div class="metric-label">Closed (all time)</div><div class="metric-value good">' + closedDeals + '</div></div>'
       + '</div>';
  if (flagged.length > 0) {
    html += '<div class="card"><div class="section-label">Flagged clients</div>';
    flagged.slice(0, 3).forEach(function(c) {
      html += '<div class="list-item" onclick="navigate(\'client-detail\',\'' + c.id + '\')">'
            + '<div class="avatar ' + avColor(c.full_name) + '">' + initials(c.full_name) + '</div>'
            + '<div class="item-info"><div class="item-name">' + c.full_name + '</div><div class="item-sub">' + c.flag_reason + '</div></div>'
            + '<div class="item-right">' + (c.retainer_required ? '<span class="item-badge badge-red">Retainer req.</span>' : '<span class="item-badge badge-amber">Flagged</span>') + '</div>'
            + '</div>';
    });
    html += '</div>';
  }
  html += '<button class="btn" onclick="doLogout()" style="margin-top:8px;color:#888;font-size:13px;border:none">Sign out</button>';
  html += '</div>';
  return html;
}

// ── Agents ─────────────────────────────────────────────────────
async function screenAgents() {
  var result = await sb.from('agents').select('*').eq('user_id', currentUser.id).order('full_name');
  if (result.error) return '<div class="content"><div class="error-msg">' + result.error.message + '</div></div>';
  var agents = result.data || [];
  if (!agents.length) {
    return '<div class="header"><h1>Agents</h1><p>No agents yet</p></div>'
         + '<div class="content"><button class="btn btn-primary" onclick="navigate(\'add-agent\')">+ Add your first agent</button></div>';
  }
  var html = '<div class="header"><h1>Agents</h1><p>' + agents.length + ' tracked</p></div><div class="content"><div class="card">';
  agents.forEach(function(a) {
    html += '<div class="list-item" onclick="navigate(\'agent-detail\',\'' + a.id + '\')">'
          + '<div class="avatar ' + avColor(a.full_name) + '">' + initials(a.full_name) + '</div>'
          + '<div class="item-info"><div class="item-name">' + a.full_name + '</div><div class="item-sub">' + (a.brokerage || '—') + '</div></div>'
          + '<div class="item-right"><div class="stars">' + starStr(a.rating) + '</div>' + categoryBadge(a.category) + '</div>'
          + '</div>';
  });
  html += '</div><button class="btn" onclick="navigate(\'add-agent\')">+ Add agent</button></div>';
  return html;
}

async function screenAgentDetail(agentId) {
  var results = await Promise.all([
    sb.from('agents').select('*').eq('id', agentId).single(),
    sb.from('agent_tags').select('tag').eq('agent_id', agentId),
    sb.from('deals').select('*').eq('agent_id', agentId).order('created_at', { ascending: false })
  ]);
  var agent = results[0].data;
  var tags  = results[1].data || [];
  var deals = results[2].data || [];
  if (!agent) return '<div class="content"><div class="error-msg">Agent not found</div></div>';

  var html = '<div class="detail-hero">'
           + '<div class="avatar ' + avColor(agent.full_name) + '" style="width:52px;height:52px;font-size:16px">' + initials(agent.full_name) + '</div>'
           + '<div><div style="font-size:17px;font-weight:500">' + agent.full_name + '</div>'
           + '<div style="font-size:13px;color:#888">' + (agent.brokerage || '—') + '</div>'
           + '<div class="stars" style="margin-top:4px">' + starStr(agent.rating) + '</div></div></div>';
  html += '<div class="content"><span class="back-btn" onclick="navigate(\'agents\')">← Back</span>';
  html += '<div class="card"><div class="section-label">Category &amp; tags</div>'
        + categoryBadge(agent.category)
        + '<div style="margin-top:8px">'
        + (tags.length ? tags.map(function(t) { return '<span class="tag">' + t.tag + '</span>'; }).join('') : '<span style="font-size:12px;color:#aaa">No tags</span>')
        + '</div></div>';
  if (agent.notes) {

async function screenClients() {
  var result = await sb.from('clients').select('*').eq('user_id', currentUser.id).order('full_name');
  if (result.error) return '<div class="content"><div class="error-msg">' + result.error.message + '</div></div>';
  var clients = result.data || [];
  if (!clients.length) {
    return '<div class="header"><h1>Clients</h1><p>No clients yet</p></div>'
         + '<div class="content"><button class="btn btn-primary" onclick="navigate(\'add-client\')">+ Add your first client</button></div>';
  }
  var html = '<div class="header"><h1>Clients</h1><p>' + clients.length + ' tracked</p></div><div class="content"><div class="card">';
  clients.forEach(function(c) {
    var badge;
    if (c.retainer_required) { badge = '<span class="item-badge badge-red">Retainer req.</span>'; }
    else if (c.flag_reason)  { badge = '<span class="item-badge badge-amber">Flagged</span>'; }
    else                     { badge = '<span class="item-badge badge-green">Good standing</span>'; }
    html += '<div class="list-item" onclick="navigate(\'client-detail\',\'' + c.id + '\')">'
          + '<div class="avatar ' + avColor(c.full_name) + '">' + initials(c.full_name) + '</div>'
          + '<div class="item-info"><div class="item-name">' + c.full_name + '</div><div class="item-sub">' + (c.phone || c.email || '—') + '</div></div>'
          + '<div class="item-right">' + badge + '</div>'

  });
  html += '</div><button class="btn" onclick="navigate(\'add-client\')">+ Add client</button></div>';
  return html;
}

async function screenClientDetail(clientId) {
  var results = await Promise.all([
    sb.from('clients').select('*').eq('id', clientId).single(),
    sb.from('visits').select('*').eq('client_id', clientId).order('visit_date', { ascending: false }),
    sb.from('deals').select('*,offers(*)').eq('client_id', clientId).order('created_at', { ascending: false })
  ]);
  var client = results[0].data;
  var visits = results[1].data || [];
  var deals  = results[2].data || [];
  if (!client) return '<div class="content"><div class="error-msg">Client not found</div></div>';

  var allOffers = [];
  deals.forEach(function(d) { if (d.offers) allOffers = allOffers.concat(d.offers); });
  var visitCount = visits.length;
  var visitPct   = Math.min(visitCount / 10 * 100, 100);
  var visitColor = visitCount > 6 ? '#A32D2D' : visitCount > 3 ? '#BA7517' : '#185FA5';

  var html = '<div class="detail-hero">'
           + '<div class="avatar ' + avColor(client.full_name) + '" style="width:52px;height:52px;font-size:16px">' + initials(client.full_name) + '</div>'
           + '<div><div style="font-size:17px;font-weight:500">' + client.full_name + '</div>'
           + '<div style="font-size:13px;color:#888">' + visitCount + ' visits · ' + allOffers.length + ' offers</div></div></div>';
  html += '<div class="content"><span class="back-btn" onclick="navigate(\'clients\')">← Back</span>';
  if (client.retainer_required) { html += '<div class="retainer-badge">&#9888; Retainer fee required</div>'; }
  if (client.flag_reason)       { html += '<div class="flag-banner">&#9873; <strong>Flagged:</strong> ' + client.flag_reason + '</div>'; }

  html += '<div class="card"><div class="section-label">Visit history (' + visitCount + ')</div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + visitPct + '%;background:' + visitColor + '"></div></div>'
        + '<div style="margin-top:10px">';
  if (visits.length) {
    visits.slice(0, 5).forEach(function(v) {
      html += '<div class="deal-row"><span style="color:#888">' + v.visit_date + '</span><span style="font-weight:500;font-size:12px">' + v.address + '</span></div>';
    });
  } else {
    html += '<div style="font-size:13px;color:#aaa">No visits logged</div>';
  }
  html += '</div></div>';

  html += '<div class="card"><div class="section-label">Offers (' + allOffers.length + ')</div>';
  if (allOffers.length) {
    allOffers.slice(0, 5).forEach(function(o) {
      var sc = o.status === 'Accepted' ? 'green' : o.status === 'Rejected' ? 'red' : 'gray';
      html += '<div class="deal-row">'
            + '<span style="color:#888">' + o.offer_date + ' · ' + o.direction + '</span>'
            + '<span style="font-weight:500">' + fmt(o.amount) + ' <span class="item-badge badge-' + sc + '">' + o.status + '</span></span>'
            + '</div>';
    });
  } else {
    html += '<div style="font-size:13px;color:#aaa">No offers logged</div>';
  }
  html += '</div>';

  if (client.notes) {
    html += '<div class="card"><div class="section-label">Notes</div><div style="font-size:13px;line-height:1.6">' + client.notes + '</div></div>';
  }
  html += '<div style="display:flex;gap:8px">'
        + '<button class="btn" style="flex:1" onclick="navigate(\'add-visit\',\'' + clientId + '\')">Log visit</button>'
        + '<button class="btn" style="flex:1" onclick="navigate(\'add-offer\',\'' + clientId + '\')">Log offer</button>'
        + '</div>';
  if (!client.retainer_required) {
    html += '<button class="btn btn-danger" onclick="setRetainer(\'' + clientId + '\')">Mark retainer required</button>';
  }
  html += '</div>';
  return html;
}

async function setRetainer(clientId) {
  var result = await sb.from('clients').update({ retainer_required: true }).eq('id', clientId);
  if (result.error) { toast('Error: ' + result.error.message); return; }
  toast('Retainer flag saved');
  navigate('client-detail', clientId);
}

async function saveAgent() {
  var name = document.getElementById('a-name').value.trim();
  if (!name) { document.getElementById('add-error').innerHTML = '<div class="error-msg">Name is required</div>'; return; }
  var allowed = await sb.rpc('check_tier_limit', { p_user_id: currentUser.id, p_table: 'agents' });
  if (!allowed.data) { document.getElementById('add-error').innerHTML = '<div class="error-msg">Free tier limit reached (5 agents). Upgrade to add more.</div>'; return; }
  var result = await sb.from('agents').insert({
    user_id:   currentUser.id,
    full_name: name,
    brokerage: document.getElementById('a-brokerage').value.trim() || null,
    phone:     document.getElementById('a-phone').value.trim() || null,
    email:     document.getElementById('a-email').value.trim() || null,
    category:  document.getElementById('a-cat').value,
    rating:    parseInt(document.getElementById('a-rating').value),
    notes:     document.getElementById('a-notes').value.trim() || null
  }).select().single();
  if (result.error) { document.getElementById('add-error').innerHTML = '<div class="error-msg">' + result.error.message + '</div>'; return; }
  var tags = document.getElementById('a-tags').value.split(',').map(function(t) { return t.trim(); }).filter(Boolean);
  if (tags.length) {
    await sb.from('agent_tags').insert(tags.map(function(tag) { return { agent_id: result.data.id, tag: tag }; }));
  }
  toast('Agent saved');
  navigate('agents');
}

async function saveOffer(clientId) {
  var addr = document.getElementById('o-addr').value.trim();
  var amt  = parseDollar(document.getElementById('o-amt').value);
  if (!addr || !amt) { document.getElementById('add-error').innerHTML = '<div class="error-msg">Address and amount are required</div>'; return; }
  var dir = document.getElementById('o-dir').value;
  var dealResult = await sb.from('deals').insert({
    user_id:    currentUser.id,
    client_id:  clientId,
    address:    addr,
    stage:      'Active',
    our_offer:   dir === 'sent'     ? amt : null,
    their_offer: dir === 'received' ? amt : null
  }).select().single();
  if (!dealResult.data) { document.getElementById('add-error').innerHTML = '<div class="error-msg">Could not create deal record</div>'; return; }
  var offerResult = await sb.from('offers').insert({
    deal_id:    dealResult.data.id,
    amount:     amt,
    direction:  dir,
    status:     document.getElementById('o-status').value,
    offer_date: document.getElementById('o-date').value,
    notes:      document.getElementById('o-notes').value.trim() || null
  });
  if (offerResult.error) { document.getElementById('add-error').innerHTML = '<div class="error-msg">' + offerResult.error.message + '</div>'; return; }
  await sb.rpc('evaluate_client_flag', { p_client_id: clientId });
  toast('Offer logged');
  navigate('client-detail', clientId);
}
